<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connecting to Quantara...</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='40' r='30' fill='%233b82f6'/%3E%3Ccircle cx='35' cy='35' r='5' fill='white'/%3E%3Ccircle cx='65' cy='35' r='5' fill='white'/%3E%3Crect x='40' y='55' width='20' height='10' fill='%233b82f6'/%3E%3C/svg%3E">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0c10;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .glass-card {
            background: rgba(20,30,45,0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 24px;
            padding: 40px;
            max-width: 400px;
        }
        .success { color: #10b981; }
        .error { color: #ef4444; }
    </style>
</head>
<body>
    <div class="glass-card">
        <h2>Connecting your Deriv account</h2>
        <div class="loader" id="loader"></div>
        <p id="status">Processing authorization...</p>
    </div>

    <script>
        (function() {
            const statusEl = document.getElementById('status');
            const loaderEl = document.getElementById('loader');
            
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');
            const state = params.get('state');
            const error = params.get('error');

            // Verify state matches the one we stored
            const storedState = sessionStorage.getItem('oauth_state');
            if (state && storedState && state !== storedState) {
                statusEl.innerHTML = '<span class="error">❌ State mismatch – possible CSRF attack.</span>';
                loaderEl.style.display = 'none';
                return;
            }

            if (code) {
                // Success – store code temporarily
                sessionStorage.setItem('deriv_auth_code', code);
                statusEl.innerHTML = '<span class="success">✅ Authorization successful! Redirecting...</span>';
                
                // In a real implementation, you would send this code to your backend
                // to exchange for an access token using your client_secret.
                // For now, we just redirect back to home.
                setTimeout(() => {
                    window.location.href = '/';
                }, 1500);
            } else if (error) {
                statusEl.innerHTML = `<span class="error">❌ Authorization failed: ${error}</span>`;
                loaderEl.style.display = 'none';
            } else {
                statusEl.innerHTML = '<span class="error">❌ No authorization code received.</span>';
                loaderEl.style.display = 'none';
            }
        })();
    </script>
</body>
</html>
