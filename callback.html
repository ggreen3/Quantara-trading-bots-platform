<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connecting to Quantara...</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0c10;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .glass-card {
            background: rgba(20,30,45,0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 24px;
            padding: 40px;
            max-width: 400px;
        }
    </style>
</head>
<body>
    <div class="glass-card">
        <h2>Connecting your Deriv account</h2>
        <div class="loader"></div>
        <p id="status">Processing authorization...</p>
    </div>

    <script>
        (function() {
            const statusEl = document.getElementById('status');
            
            // Get parameters from URL
            const params = new URLSearchParams(window.location.search);
            
            // Check if we received tokens (Deriv returns acct1, token1, etc.)
            if (params.has('acct1')) {
                // Extract all accounts
                const accounts = [];
                let i = 1;
                while (params.has(`acct${i}`)) {
                    accounts.push({
                        account: params.get(`acct${i}`),
                        token: params.get(`token${i}`),
                        currency: params.get(`cur${i}`)
                    });
                    i++;
                }
                
                // Store the first token as primary
                if (accounts.length > 0) {
                    localStorage.setItem('deriv_token', accounts[0].token);
                    localStorage.setItem('deriv_accounts', JSON.stringify(accounts));
                    
                    statusEl.innerText = '✅ Connected successfully! Redirecting...';
                    
                    // Redirect back to home page
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1500);
                } else {
                    statusEl.innerText = '❌ No account data received';
                }
            } 
            // Check for error
            else if (params.has('error')) {
                statusEl.innerText = `❌ Authorization failed: ${params.get('error_description') || params.get('error')}`;
            }
            else {
                statusEl.innerText = '❌ No authorization data received';
            }
        })();
    </script>
</body>
</html>
