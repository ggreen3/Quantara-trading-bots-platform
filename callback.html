<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connecting to Quantara...</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='40' r='30' fill='%233b82f6'/%3E%3Ccircle cx='35' cy='35' r='5' fill='white'/%3E%3Ccircle cx='65' cy='35' r='5' fill='white'/%3E%3Crect x='40' y='55' width='20' height='10' fill='%233b82f6'/%3E%3C/svg%3E">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0c10;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .glass-card {
            background: rgba(20,30,45,0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 24px;
            padding: 40px;
            max-width: 400px;
        }
        .success { color: #10b981; }
        .error { color: #ef4444; }
    </style>
</head>
<body>
    <div class="glass-card">
        <h2>Connecting your Deriv account</h2>
        <div class="loader" id="loader"></div>
        <p id="status">Processing authorization...</p>
        <div id="accountList" style="text-align: left; margin-top: 20px; display: none;"></div>
    </div>

    <script>
        (function() {
            const statusEl = document.getElementById('status');
            const loaderEl = document.getElementById('loader');
            const accountListEl = document.getElementById('accountList');
            
            // Get all parameters from URL
            const params = new URLSearchParams(window.location.search);
            
            // Check if we received account tokens (Deriv returns acct1, token1, cur1, etc.)
            if (params.has('acct1')) {
                // Parse all accounts
                const accounts = [];
                let i = 1;
                
                while (params.has(`acct${i}`)) {
                    accounts.push({
                        account: params.get(`acct${i}`),
                        token: params.get(`token${i}`),
                        currency: params.get(`cur${i}`)
                    });
                    i++;
                }
                
                // Store accounts in sessionStorage
                if (accounts.length > 0) {
                    sessionStorage.setItem('deriv_accounts', JSON.stringify(accounts));
                    // Store first token as primary for backward compatibility
                    sessionStorage.setItem('deriv_token', accounts[0].token);
                    
                    statusEl.innerHTML = '<span class="success">✅ Connected successfully!</span>';
                    loaderEl.style.display = 'none';
                    
                    // Display account list
                    accountListEl.style.display = 'block';
                    accountListEl.innerHTML = '<h3>Accounts connected:</h3>' + 
                        accounts.map(acc => 
                            `<div style="padding: 8px; margin: 5px 0; background: rgba(255,255,255,0.05); border-radius: 8px;">
                                <strong>${acc.account}</strong> (${acc.currency})<br>
                                <small style="color: #9ca3af;">Token: ${acc.token.substring(0, 10)}...</small>
                            </div>`
                        ).join('');
                    
                    // Redirect back to home after 3 seconds
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 3000);
                } else {
                    statusEl.innerHTML = '<span class="error">❌ No account data received</span>';
                    loaderEl.style.display = 'none';
                }
            } 
            // Check for error
            else if (params.has('error')) {
                statusEl.innerHTML = `<span class="error">❌ Authorization failed: ${params.get('error_description') || params.get('error')}</span>`;
                loaderEl.style.display = 'none';
            }
            else {
                statusEl.innerHTML = '<span class="error">❌ No authorization data received. Expected account tokens.</span>';
                loaderEl.style.display = 'none';
            }
        })();
    </script>
</body>
</html>
