<!DOCTYPE html>
<html>
<head><title>Quantara Bot</title><style>body{background:#0a0c10;color:white;text-align:center;padding:50px;}</style></head>
<body>
<div id="loader">Loading bot...</div>
<script>
(async () => {
    const params = new URLSearchParams(location.search);
    const botId = params.get('id');
    const token = sessionStorage.getItem('deriv_access_token');
    if (!token) {
        alert('Please connect your Deriv account first.');
        location.href = '/';
        return;
    }
    try {
        const res = await fetch(`/api/bot-content?id=${botId}`, {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        if (!res.ok) throw new Error(await res.text());
        const html = await res.text();
        document.open();
        document.write(html);
        document.close();
    } catch (err) {
        document.getElementById('loader').innerHTML = `<h3>Error: ${err.message}</h3>`;
    }
})();
</script>
</body>
</html>
