<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantara – AI Trading Bots</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', system-ui; background: #0a0c10; color: white; padding: 20px; }
        .container { max-width: 1200px; margin: auto; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; flex-wrap: wrap; gap: 16px; }
        .logo { font-size: 2rem; font-weight: 700; }
        .logo span { color: #3b82f6; }
        .btn-connect { background: #3b82f6; border: none; color: white; padding: 10px 24px; border-radius: 40px; cursor: pointer; font-weight: 600; transition: all 0.2s; }
        .btn-connect.connected { background: #10b981; }
        .btn-connect:hover { transform: scale(1.02); }
        .demo-toggle { display: flex; background: #1e293b; border-radius: 40px; padding: 4px; }
        .demo-toggle button { background: transparent; border: none; padding: 8px 16px; border-radius: 32px; cursor: pointer; color: #94a3b8; font-weight: 500; }
        .demo-toggle button.active { background: #3b82f6; color: white; }
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin: 40px 0; }
        .card { background: #1e293b; border-radius: 20px; padding: 24px; border: 1px solid #334155; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .card h3 { color: #94a3b8; font-size: 0.9rem; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .card .value { font-size: 2.5rem; font-weight: 700; color: #3b82f6; }
        .card .sub { font-size: 0.8rem; color: #64748b; margin-top: 8px; }
        .bot-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .bot-card { background: #1e293b; border-radius: 16px; padding: 20px; text-decoration: none; color: white; display: block; transition: transform 0.2s; border: 1px solid #334155; }
        .bot-card:hover { transform: translateY(-4px); border-color: #3b82f6; }
        .bot-card h3 { margin: 0 0 8px; color: #3b82f6; }
        .bot-card p { color: #94a3b8; font-size: 0.9rem; }
        .badge { background: #334155; padding: 4px 12px; border-radius: 40px; font-size: 0.7rem; display: inline-block; margin-top: 12px; }
        .status-connected { color: #10b981; }
        .status-disconnected { color: #ef4444; }
        .refresh-btn { background: #3b82f6; border: none; color: white; padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 0.8rem; margin-left: 10px; }
        footer { margin-top: 60px; text-align: center; color: #64748b; border-top: 1px solid #1e293b; padding-top: 30px; }
        @media (max-width: 768px) { .card .value { font-size: 1.8rem; } }
        .error-text { color: #ef4444; font-size: 0.9rem; }
        .loading { opacity: 0.6; }
    </style>
</head>
<body>
<div class="container">
    <header>
        <div class="logo">Quantara<span>.</span></div>
        <div style="display: flex; gap: 16px; align-items: center;">
            <div class="demo-toggle" id="demoToggle">
                <button class="active" data-mode="demo">Demo</button>
                <button data-mode="real">Real</button>
            </div>
            <button class="btn-connect" id="connectBtn">Connect Deriv</button>
        </div>
    </header>

    <div id="dashboardSection" style="display: none;">
        <div class="dashboard">
            <div class="card">
                <h3>Account Type</h3>
                <div class="value" id="accountType">—</div>
                <div class="sub">Connected via OAuth</div>
            </div>
            <div class="card">
                <h3>Balance</h3>
                <div class="value" id="balance">$0.00</div>
                <div class="sub" id="currency">USD <button class="refresh-btn" id="refreshBalance">↻</button></div>
            </div>
            <div class="card">
                <h3>Status</h3>
                <div class="value" id="connectionStatus">Connecting...</div>
                <div class="sub">Real-time via REST API</div>
            </div>
        </div>
    </div>

    <h2>Available Trading Bots</h2>
    <div id="botGrid" class="bot-grid">Loading bots...</div>
</div>
<footer>
    <p>© 2026 Quantara. All rights reserved. | <a href="#" style="color:#64748b;">Terms</a> | <a href="#" style="color:#64748b;">Privacy</a></p>
</footer>

<script>
    const DERIV_CLIENT_ID = '33qLDInCA4ES1yc8LJDK1';
    const REDIRECT_URI = encodeURIComponent(window.location.origin + '/callback.html');
    const SCOPES = 'trade account_manage';

    let currentToken = null;

    // ========== PKCE Helpers ==========
    async function generatePKCE() {
        const array = crypto.getRandomValues(new Uint8Array(64));
        const codeVerifier = Array.from(array).map(v => 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~'[v % 66]).join('');
        const encoder = new TextEncoder();
        const data = encoder.encode(codeVerifier);
        const hash = await crypto.subtle.digest('SHA-256', data);
        const codeChallenge = btoa(String.fromCharCode(...new Uint8Array(hash))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
        return { codeVerifier, codeChallenge };
    }

    // ========== Fetch account info via REST API ==========
    async function fetchAccountInfo(token) {
        const statusEl = document.getElementById('connectionStatus');
        const balanceEl = document.getElementById('balance');
        const accountTypeEl = document.getElementById('accountType');
        
        statusEl.innerHTML = 'Fetching account...';
        statusEl.classList.remove('status-connected', 'status-disconnected');
        
        try {
            // Use Deriv's REST API to authorize and get account info
            const response = await fetch('https://api.deriv.com/v3/authorize', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ authorize: token })
            });
            
            const data = await response.json();
            console.log('REST authorize response:', data);
            
            if (data.error) {
                throw new Error(data.error.message || 'Authorization failed');
            }
            
            const auth = data.authorize;
            const balance = parseFloat(auth.balance).toFixed(2);
            const currency = auth.currency || 'USD';
            const isDemo = auth.landing_company === 'virtual';
            const accountType = isDemo ? 'Demo Account' : 'Real Account';
            
            balanceEl.innerHTML = `${currency} ${balance}`;
            document.getElementById('currency').innerHTML = `${currency} <button class="refresh-btn" id="refreshBalance">↻</button>`;
            accountTypeEl.innerHTML = accountType;
            statusEl.innerHTML = 'Connected ✓';
            statusEl.classList.add('status-connected');
            
            // Store for later
            sessionStorage.setItem('deriv_balance', balance);
            sessionStorage.setItem('deriv_account_type', isDemo ? 'demo' : 'real');
            
            // Update demo/real toggle to match actual account
            const mode = isDemo ? 'demo' : 'real';
            const btns = document.querySelectorAll('#demoToggle button');
            btns.forEach(btn => {
                if (btn.dataset.mode === mode) btn.classList.add('active');
                else btn.classList.remove('active');
            });
            localStorage.setItem('trading_mode', mode);
            
            // Attach refresh button listener
            document.getElementById('refreshBalance')?.addEventListener('click', () => fetchAccountInfo(token));
            
        } catch (err) {
            console.error('REST API error:', err);
            statusEl.innerHTML = `Error: ${err.message}`;
            statusEl.classList.add('status-disconnected');
            balanceEl.innerHTML = '$0.00';
            accountTypeEl.innerHTML = '—';
        }
    }

    // ========== WebSocket (optional, for future use) – but we use REST now ==========
    // We keep the function but do not use it for now
    function updateConnectionStatus() {
        const token = sessionStorage.getItem('deriv_access_token');
        const btn = document.getElementById('connectBtn');
        if (token) {
            btn.textContent = 'Connected ✓';
            btn.classList.add('connected');
            currentToken = token;
            document.getElementById('dashboardSection').style.display = 'block';
            fetchAccountInfo(token);
        } else {
            btn.textContent = 'Connect Deriv';
            btn.classList.remove('connected');
            document.getElementById('dashboardSection').style.display = 'none';
        }
    }

    // ========== OAuth Login ==========
    document.getElementById('connectBtn').addEventListener('click', async () => {
        if (sessionStorage.getItem('deriv_access_token')) {
            // Disconnect
            sessionStorage.clear();
            location.reload();
            return;
        }
        const { codeVerifier, codeChallenge } = await generatePKCE();
        const state = crypto.randomUUID();
        sessionStorage.setItem('pkce_code_verifier', codeVerifier);
        sessionStorage.setItem('oauth_state', state);
        const authUrl = `https://auth.deriv.com/oauth2/auth?response_type=code&client_id=${DERIV_CLIENT_ID}&redirect_uri=${REDIRECT_URI}&scope=${SCOPES}&state=${state}&code_challenge=${codeChallenge}&code_challenge_method=S256`;
        window.location.href = authUrl;
    });

    // ========== Demo/Real Toggle (just UI preference) ==========
    document.querySelectorAll('#demoToggle button').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('#demoToggle button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            localStorage.setItem('trading_mode', btn.dataset.mode);
        });
    });

    // ========== Load bots (mock, replace with your API later) ==========
    async function loadBots() {
        // Try to fetch from your Firestore API, fallback to mock
        try {
            const res = await fetch('/api/list-bots');
            if (res.ok) {
                const bots = await res.json();
                if (bots && bots.length) {
                    renderBots(bots);
                    return;
                }
            }
        } catch (err) {
            console.log('Using mock bots');
        }
        // Mock bots
        const mockBots = [
            { id: 'v10-bot', name: 'V10 Volatility Expert', tier: 'free', price: 0 },
            { id: 'scalper-pro', name: 'Scalper Pro', tier: 'premium', price: 800 },
            { id: 'trend-rider', name: 'Trend Rider', tier: 'premium', price: 1200 },
            { id: 'harvey-specter', name: 'Harvey Specter', tier: 'premium', price: 2000 }
        ];
        renderBots(mockBots);
    }

    function renderBots(bots) {
        const grid = document.getElementById('botGrid');
        if (!bots || bots.length === 0) {
            grid.innerHTML = '<p>No bots available. Check back soon.</p>';
            return;
        }
        grid.innerHTML = bots.map(bot => `
            <a href="/bot.html?id=${bot.id}" class="bot-card">
                <h3>${escapeHtml(bot.name)}</h3>
                <p>${bot.tier === 'free' ? 'Free' : 'Premium - KES ' + (bot.price || 0)}</p>
                <span class="badge">Lease 2 weeks</span>
            </a>
        `).join('');
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // ========== Initialize ==========
    updateConnectionStatus();
    loadBots();
</script>
</body>
</html>
