<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantara – AI Trading Bots</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', system-ui; background: #0a0c10; color: white; padding: 20px; }
        .container { max-width: 1200px; margin: auto; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; flex-wrap: wrap; gap: 16px; }
        .logo { font-size: 2rem; font-weight: 700; }
        .logo span { color: #3b82f6; }
        .btn-connect { background: #3b82f6; border: none; color: white; padding: 10px 24px; border-radius: 40px; cursor: pointer; font-weight: 600; }
        .btn-connect.connected { background: #10b981; }
        .demo-toggle { display: flex; background: #1e293b; border-radius: 40px; padding: 4px; }
        .demo-toggle button { background: transparent; border: none; padding: 8px 16px; border-radius: 32px; cursor: pointer; color: #94a3b8; font-weight: 500; }
        .demo-toggle button.active { background: #3b82f6; color: white; }
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin: 40px 0; }
        .card { background: #1e293b; border-radius: 20px; padding: 24px; border: 1px solid #334155; }
        .card h3 { color: #94a3b8; font-size: 0.9rem; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .card .value { font-size: 2.5rem; font-weight: 700; color: #3b82f6; }
        .card .sub { font-size: 0.8rem; color: #64748b; margin-top: 8px; }
        .bot-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .bot-card { background: #1e293b; border-radius: 16px; padding: 20px; text-decoration: none; color: white; display: block; transition: transform 0.2s; border: 1px solid #334155; }
        .bot-card:hover { transform: translateY(-4px); border-color: #3b82f6; }
        .bot-card h3 { margin: 0 0 8px; color: #3b82f6; }
        .bot-card p { color: #94a3b8; font-size: 0.9rem; }
        .badge { background: #334155; padding: 4px 12px; border-radius: 40px; font-size: 0.7rem; display: inline-block; margin-top: 12px; }
        .status-connected { color: #10b981; }
        .status-disconnected { color: #ef4444; }
        footer { margin-top: 60px; text-align: center; color: #64748b; border-top: 1px solid #1e293b; padding-top: 30px; }
        @media (max-width: 768px) { .card .value { font-size: 1.8rem; } }
    </style>
</head>
<body>
<div class="container">
    <header>
        <div class="logo">Quantara<span>.</span></div>
        <div style="display: flex; gap: 16px; align-items: center;">
            <div class="demo-toggle" id="demoToggle">
                <button class="active" data-mode="demo">Demo</button>
                <button data-mode="real">Real</button>
            </div>
            <button class="btn-connect" id="connectBtn">Connect Deriv</button>
        </div>
    </header>

    <div id="dashboardSection" style="display: none;">
        <div class="dashboard">
            <div class="card">
                <h3>Account Type</h3>
                <div class="value" id="accountType">—</div>
                <div class="sub">Connected via OAuth</div>
            </div>
            <div class="card">
                <h3>Balance</h3>
                <div class="value" id="balance">$0.00</div>
                <div class="sub" id="currency">USD</div>
            </div>
            <div class="card">
                <h3>Status</h3>
                <div class="value" id="connectionStatus">Connected</div>
                <div class="sub">Real-time updates</div>
            </div>
        </div>
    </div>

    <h2>Available Trading Bots</h2>
    <div id="botGrid" class="bot-grid">Loading bots...</div>
</div>
<footer>
    <p>© 2026 Quantara. All rights reserved. | <a href="#" style="color:#64748b;">Terms</a> | <a href="#" style="color:#64748b;">Privacy</a></p>
</footer>

<script>
    // ---------- Deriv OAuth PKCE ----------
    const DERIV_CLIENT_ID = '33qLDInCA4ES1yc8LJDK1';
    const REDIRECT_URI = encodeURIComponent(window.location.origin + '/callback.html');
    const SCOPES = 'trade';

    let derivSocket = null;
    let currentToken = null;

    async function generatePKCE() {
        const array = crypto.getRandomValues(new Uint8Array(64));
        const codeVerifier = Array.from(array).map(v => 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~'[v % 66]).join('');
        const encoder = new TextEncoder();
        const data = encoder.encode(codeVerifier);
        const hash = await crypto.subtle.digest('SHA-256', data);
        const codeChallenge = btoa(String.fromCharCode(...new Uint8Array(hash))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
        return { codeVerifier, codeChallenge };
    }

    // Connect to Deriv WebSocket and subscribe to balance
    function connectDerivWebSocket(token) {
        if (derivSocket && derivSocket.readyState === WebSocket.OPEN) {
            derivSocket.close();
        }
        derivSocket = new WebSocket('wss://ws.derivws.com/websockets/v3?app_id=1089');
        derivSocket.onopen = () => {
            derivSocket.send(JSON.stringify({ authorize: token }));
        };
        derivSocket.onmessage = (msg) => {
            const data = JSON.parse(msg.data);
            if (data.error) {
                console.error('Deriv WS error:', data.error);
                document.getElementById('connectionStatus').innerHTML = 'Error';
                return;
            }
            if (data.authorize) {
                // Authorized – now get balance and account settings
                derivSocket.send(JSON.stringify({ balance: 1, subscribe: 1 }));
                derivSocket.send(JSON.stringify({ get_settings: 1 }));
                document.getElementById('connectionStatus').innerHTML = 'Connected';
                document.getElementById('connectionStatus').classList.add('status-connected');
            }
            if (data.balance) {
                const balance = parseFloat(data.balance.balance).toFixed(2);
                const currency = data.balance.currency || 'USD';
                document.getElementById('balance').innerHTML = `${currency} ${balance}`;
                document.getElementById('currency').innerHTML = currency;
                // Also store balance for later use
                sessionStorage.setItem('deriv_balance', balance);
            }
            if (data.get_settings) {
                const landingCompany = data.get_settings.landing_company;
                // Determine demo/real: if landing_company is 'virtual' then demo, else real
                const isDemo = landing_company === 'virtual';
                const accountType = isDemo ? 'Demo Account' : 'Real Account';
                document.getElementById('accountType').innerHTML = accountType;
                sessionStorage.setItem('deriv_account_type', isDemo ? 'demo' : 'real');
                // Sync toggle UI (optional)
                const activeMode = isDemo ? 'demo' : 'real';
                const demoButtons = document.querySelectorAll('#demoToggle button');
                demoButtons.forEach(btn => {
                    if (btn.dataset.mode === activeMode) btn.classList.add('active');
                    else btn.classList.remove('active');
                });
            }
        };
        derivSocket.onclose = () => {
            console.log('Deriv WS closed');
            if (currentToken) {
                // attempt reconnect after 3 seconds
                setTimeout(() => connectDerivWebSocket(currentToken), 3000);
            }
        };
    }

    function updateConnectionStatus() {
        const token = sessionStorage.getItem('deriv_access_token');
        const btn = document.getElementById('connectBtn');
        if (token) {
            btn.textContent = 'Connected ✓';
            btn.classList.add('connected');
            currentToken = token;
            connectDerivWebSocket(token);
            document.getElementById('dashboardSection').style.display = 'block';
        } else {
            btn.textContent = 'Connect Deriv';
            btn.classList.remove('connected');
            if (derivSocket) derivSocket.close();
            document.getElementById('dashboardSection').style.display = 'none';
        }
    }

    document.getElementById('connectBtn').addEventListener('click', async () => {
        if (sessionStorage.getItem('deriv_access_token')) {
            // Disconnect
            sessionStorage.removeItem('deriv_access_token');
            sessionStorage.removeItem('oauth_state');
            sessionStorage.removeItem('pkce_code_verifier');
            if (derivSocket) derivSocket.close();
            updateConnectionStatus();
            return;
        }
        const { codeVerifier, codeChallenge } = await generatePKCE();
        const state = crypto.randomUUID();
        sessionStorage.setItem('pkce_code_verifier', codeVerifier);
        sessionStorage.setItem('oauth_state', state);
        const authUrl = `https://auth.deriv.com/oauth2/auth?response_type=code&client_id=${DERIV_CLIENT_ID}&redirect_uri=${REDIRECT_URI}&scope=${SCOPES}&state=${state}&code_challenge=${codeChallenge}&code_challenge_method=S256`;
        window.location.href = authUrl;
    });

    // Demo/real toggle (just UI for now; actual account type is from Deriv)
    const demoButtons = document.querySelectorAll('#demoToggle button');
    demoButtons.forEach(btn => {
        btn.addEventListener('click', () => {
            demoButtons.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            localStorage.setItem('trading_mode', btn.dataset.mode);
            // If we want to switch account, we could call Deriv's switch_account, but for MVP we just store preference.
        });
    });

    // Load bots from Firestore via API
    async function loadBots() {
        try {
            const res = await fetch('/api/list-bots');
            const bots = await res.json();
            const grid = document.getElementById('botGrid');
            if (!bots.length) {
                grid.innerHTML = '<p>No bots uploaded yet. Admin can upload via /admin/upload.html</p>';
                return;
            }
            grid.innerHTML = bots.map(bot => `
                <a href="/bot.html?id=${bot.id}" class="bot-card">
                    <h3>${bot.name}</h3>
                    <p>${bot.tier === 'free' ? 'Free' : 'Premium'}</p>
                    <span class="badge">Lease 2 weeks</span>
                </a>
            `).join('');
        } catch (err) {
            document.getElementById('botGrid').innerHTML = '<p>Error loading bots. Please try again later.</p>';
        }
    }

    updateConnectionStatus();
    loadBots();
</script>
</body>
</html>
